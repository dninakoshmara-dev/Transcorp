name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create .env for compose
        run: |
          echo "JWT_SECRET=ci_secret_change_me" > .env

      - name: Build backend image
        run: |
          docker compose build backend

      - name: Start db + backend
        run: |
          docker compose up -d db backend
          docker compose ps

      - name: Run migrate + seed
        run: |
          docker compose --profile tools run --rm seed

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            status=$(docker inspect -f '{{.State.Health.Status}}' transport-system-backend-1 2>/dev/null || true)
            echo "backend health: $status"
            if [ "$status" = "healthy" ]; then exit 0; fi
            sleep 2
          done
          echo "Backend did not become healthy"
          docker compose logs --tail 200 backend
          exit 1

      - name: Smoke test login + dashboard
        run: |
          token=$(curl -s -X POST "http://127.0.0.1:3001/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"admin@example.com","password":"Admin123!"}' | jq -r .access_token)

          if [ -z "$token" ] || [ "$token" = "null" ]; then
            echo "Login failed"
            docker compose logs --tail 200 backend
            exit 1
          fi

          curl -s -f "http://127.0.0.1:3001/api/dashboard" \
            -H "Authorization: Bearer $token" | jq .

      - name: Logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --tail 200 db
          docker compose logs --tail 200 backend

      - name: Shutdown
        if: always()
        run: |
          docker compose down -v
